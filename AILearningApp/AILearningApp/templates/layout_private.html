<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
        {% block title %}
        {% endblock %}
    </title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <link href="{{ url_for('static', filename='css/tailwind.css') }}" rel="stylesheet">

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Pines UI用スタイル  -->
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="text-stone-800 h-screen flex flex-col ">

    <!-- Header (x-dataで開閉状態を管理。relativeでドロップダウンの位置を基準化) -->
    <header x-data="{ mobileMenuOpen: false }" class="bg-white border-b relative flex-shrink-0">
        <div class="max-w-6xl mx-auto px-5 py-5 flex justify-between items-center">

            <!-- Logo -->
            <div class="flex items-center gap-4">

                <span class="w-14 h-14 rounded-full flex items-center justify-center text-4xl flex-shrink-0">
                    <i class="fa-solid fa-robot"></i>
                </span>

                <!-- テキストエリア（構造を変えず、縦横の中央揃えを適用） -->
                <a href="/" class="flex flex-col md:flex-row md:items-center gap-1 md:gap-4 group">
                    <!-- メインタイトル（文字色をNeubrutalism調のstone-900に統一） -->
                    <h1
                        class="text-xl md:text-3xl font-extrabold text-stone-900 group-hover:text-stone-700 transition-colors tracking-tight">
                        AIコードチェッカー
                    </h1>
                    <!-- 説明文（縦中央に揃うよう配置、文字色をstone-500に調整） -->
                    <p class="text-xs md:text-sm font-medium text-stone-500 leading-tight">
                        AIによる<br class="hidden md:inline">コード添削アプリ
                    </p>
                </a>
            </div>

            <!-- PC用Menu (hidden md:flex でスマホ時は非表示、PC時のみ横並び表示) -->
            <!-- <div class="hidden md:flex items-center gap-3">
                <a href="{{ url_for('mypage') }}"
                    class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium tracking-wide text-white transition-colors duration-200 rounded-md bg-neutral-950 hover:bg-neutral-900 focus:ring-2 focus:ring-offset-2 focus:ring-neutral-900 focus:shadow-outline focus:outline-none">マイページ</a>
                <a href="{{ url_for('mypage_edit') }}"
                    class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium tracking-wide text-white transition-colors duration-200 rounded-md bg-neutral-950 hover:bg-neutral-900 focus:ring-2 focus:ring-offset-2 focus:ring-neutral-900 focus:shadow-outline focus:outline-none">会員情報変更</a>
                <a href="{{ url_for('logout') }}"
                    class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium tracking-wide text-white transition-colors duration-200 rounded-md bg-neutral-950 hover:bg-neutral-900 focus:ring-2 focus:ring-offset-2 focus:ring-neutral-900 focus:shadow-outline focus:outline-none">ログアウト</a>
            </div> -->

            <!-- ユーザーメニュー開閉ボタン -->
            <div class="flex items-center">
                <button @click="mobileMenuOpen = true"
                    class="flex items-center gap-2 text-stone-700 hover:text-stone-900 transition">


                    <!-- ユーザー名 -->
                    <span class="font-medium  hidden md:flex">
                        {{ current_user.user_name }}
                    </span>

                    <span
                        class="w-10 h-10 rounded-full border-2 border-stone-900 overflow-hidden  bg-white flex-shrink-0">
                        {% if current_user.icon_filename %}
                        <img src=" /static/uploads/{{ current_user.icon_filename }}" class="w-full h-full object-cover">
                        {% else %}
                        <img src="/static/images/default.png" class="w-full h-full object-cover">
                        {% endif %}
                    </span>

                    <!-- 下向き矢印 -->
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                        </path>
                    </svg>

                </button>
            </div>

        </div> <!-- 横並びエリアの終了タグ -->

        <!-- 【右からスライドするスマホ用メニュー】 -->

        <!-- 背景の暗いマスク（オーバーレイ）：ここをクリックしてもメニューが閉じる -->
        <div x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0" @click="mobileMenuOpen = false"
            class="fixed inset-0 bg-neutral-950/40 z-50 " x-cloak></div>

        <!-- メニュー本体：画面の右端に固定（fixed inset-y-0 right-0）、横幅 w-64（変更可能） -->
        <div x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-300 transform"
            x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
            x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-start="translate-x-0"
            x-transition:leave-end="translate-x-full"
            class="fixed inset-y-0 right-0 w-70 bg-white z-50 shadow-2xl p-6 flex flex-col" x-cloak>

            <!-- メニュー内の「閉じる」用 × ボタン -->
            <div class="flex justify-end mb-6">
                <button @click="mobileMenuOpen = false"
                    class="p-1 text-stone-900 hover:text-stone-800 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <!-- 縦並びのメニューリンク（PC版のボタン風デザインに合わせる場合はここで調整可能） -->
            <div class="flex flex-col gap-4">
                <a href="{{ url_for('questions') }}"
                    class="block py-2 text-stone-700 hover:text-stone-900  hover:bg-stone-100 font-medium  ">
                    <span>
                        <i class="fa-solid fa-graduation-cap fa-fw"></i>
                    </span>
                    　問題一覧
                </a>
                <a href="{{ url_for('mypage') }}"
                    class="block py-2 text-stone-700 hover:text-stone-900  hover:bg-stone-100 font-medium  ">
                    <span>
                        <i class="fa-solid fa-chart-line fa-fw"></i>
                    </span>
                    　マイページ
                </a>
                <a href="{{ url_for('mypage_edit') }}"
                    class="block py-2 text-stone-700 hover:text-stone-900 font-medium  hover:bg-stone-100 ">
                    <span>
                        <i class="fa-solid fa-gear fa-fw"></i>
                    </span>
                    　会員情報変更
                </a>
                <a href="{{ url_for('logout') }}"
                    class="block py-2 text-stone-700 hover:text-stone-900 font-medium  hover:bg-stone-100 ">
                    <span>
                        <i class="fa-solid fa-arrow-right-from-bracket fa-fw"></i>
                    </span>
                    　ログアウト
                </a>
            </div>
        </div>

    </header>

    <!-- Main -->
    <main class="flex-1 max-w-6xl w-full mx-auto px-5 py-6">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-stone-900 py-3 text-center flex-shrink-0">
        <p class="text-sm text-stone-700">
            © AIコードチェッカー｜長谷川栞奈
        </p>
    </footer>

    {% block scripts %}
    {% endblock %}

</body>

</html>
