{% extends "layout_private.html" %}

{% block content %}
<div class="max-w-6xl mx-auto h-full flex flex-col ">

    <!-- ページタイトル -->
    <div class="mb-5 text-center md:text-left md:flex md:gap-10 justify-between">
        <h1 class="text-3xl font-extrabold text-stone-900 tracking-tight">

            問題一覧
        </h1>
        <!-- <p class="text-sm text-stone-600 mt-2">問題を検索してプログラミングに挑戦！</p> -->


        <!-- 検索フォーム -->
        <div class="mb-10">
            <form method="get" class="flex flex-row gap-4 items-end flex-wrap sm:flex-nowrap">

                <!-- カテゴリ選択 -->
                <div class="flex flex-col gap-1.5 flex-1 min-w-[140px]">
                    <label class="text-sm font-bold text-stone-900">カテゴリ</label>
                    <div class="relative w-full">
                        <select name="category_id"
                            class="flex w-full px-3 py-2 text-sm bg-white border border-stone-900 rounded-md text-stone-900 appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-stone-950/20 transition duration-200">
                            <option value="">すべて</option>
                            {% for category in categories %}
                            <option value="{{ category[0] }}">{{ category[1] }}</option>
                            {% endfor %}
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-stone-900">
                            <svg class="fill-current h-4 w-4 border-l border-stone-900 pl-1" xmlns="http://w3.org"
                                viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- 難易度選択 -->
                <div class="flex flex-col gap-1.5 w-32 sm:w-40 flex-shrink-0">
                    <label class="text-sm font-bold text-stone-900">難易度</label>
                    <div class="relative w-full">
                        <select name="difficulty"
                            class="flex w-full px-3 py-2 text-sm bg-white border border-stone-900 rounded-md text-stone-900 appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-stone-950/20 transition duration-200">
                            <option value="">全難易度</option>
                            <option value="1">★1</option>
                            <option value="2">★2</option>
                            <option value="3">★3</option>
                            <option value="4">★4</option>
                            <option value="5">★5</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-stone-900">
                            <svg class="fill-current h-4 w-4 border-l border-stone-900 pl-1" xmlns="http://w3.org"
                                viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- 検索ボタン -->
                <button type="submit"
                    class="flex items-center gap-2 px-6 py-2 text-sm font-medium tracking-wide text-white transition-colors duration-200 rounded-md bg-neutral-950 hover:bg-neutral-800 focus:ring-2 focus:ring-offset-2 focus:ring-neutral-900 focus:shadow-outline focus:outline-none cursor-pointer whitespace-nowrap h-[39px] flex-shrink-0">
                    検索
                    <span class="">
                        <i class="fa-solid fa-magnifying-glass" style="color: rgb(255, 255, 255);"></i>
                    </span>

                </button>

            </form>
        </div>
    </div>


    <!-- 判定結果の凡例 -->
    <div class="flex items-center justify-end gap-2 text-xs font-bold text-stone-500 pb-4 ">

        <div class="w-4 h-4 bg-emerald-100 border border-emerald-400 rounded"></div>
        <span>正解</span>

        <div class="w-4 h-4 bg-rose-100 border border-rose-400 rounded"></div>
        <span>不正解</span>

        <div class="w-4 h-4 bg-amber-100 border border-amber-400 rounded"></div>
        <span>判定不能</span>

    </div>

    <!-- テーブル -->
    <div class="bg-white border-2 border-stone-900 rounded-xl overflow-hidden">
        <div class="max-h-[350px] overflow-y-auto overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-stone-100 border-b-2 border-stone-900">
                        <th class="px-6 py-4 text-xs font-bold text-stone-900 uppercase tracking-wider">タイトル</th>
                        <th class="px-6 py-4 text-xs font-bold text-stone-900 uppercase tracking-wider">カテゴリ</th>
                        <th class="px-6 py-4 text-xs font-bold text-stone-900 uppercase tracking-wider w-32">難易度</th>
                    </tr>
                </thead>

                <tbody class="divide-y divide-stone-200 text-sm text-stone-800">

                    {% for row in rows %}

                    <tr class="
                        transition-colors duration-150
                        hover:bg-stone-200

                        {% if row[4] == 'OK' %}
                            bg-emerald-200
                        {% elif row[4] == 'NG' %}
                            bg-rose-200
                        {% elif row[4] == 'UNKNOWN' %} 
                            bg-amber-200
                        {% endif %}
                         ">


                        <!-- タイトルリンク -->
                        <td class=" px-6 py-4 font-semibold text-stone-900"> <a href="/question/{{ row[0] }}"
                                class="hover:text-stone-600 hover:underline block transition"> {{ row[0] }}{{ row[1] }}
                            </a> </td> <!-- カテゴリ（色・背景なしの標準テキスト） -->
                        <td class="px-6 py-4 text-stone-800"> {{ row[2] }} </td> <!-- 難易度（難易度の数だけ星を表示させる） -->
                        <td class="px-6 py-4 text-stone-800"> <span class="inline-flex tracking-tight select-none"> {%
                                set diff_num = row[3]|int %} {% for i in range(1, 6) %} {% if i <= diff_num %} ★ {% else
                                    %} <span class="text-stone-900">☆</span> {% endif %} {% endfor %} </span> </td>
                    </tr> {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
